name: CI
on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

permissions:
    contents: read
    checks: write
jobs:
    build-and-test:
        name: Build the project
        runs-on: blacksmith-4vcpu-ubuntu-2404
        # if: github.event_name == 'pull_request'
        # Ephemeral Postgres on the runner network — avoids remote DB latency/TLS in integration tests.
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: ci
                    POSTGRES_PASSWORD: ci
                    POSTGRES_DB: auth_ci
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U ci -d auth_ci"
                    --health-interval 4s
                    --health-timeout 5s
                    --health-retries 10
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: latest

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Run eslint
              run: pnpm run lint:fix

            - name: Test and coverage
              run: pnpm run test
              env:
                  NODE_ENV: test
                  # Use localhost: the service publishes 5432 on the host; some runners (e.g. Blacksmith) do not resolve the `postgres` service hostname.
                  DB_HOST: localhost
                  DB_PORT: "5432"
                  DB_USERNAME: ci
                  DB_PASSWORD: ci
                  DB_NAME: auth_ci
                  # Local Postgres in CI does not require TLS; omit DB_SSL / PGSSLMODE.
                  REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
                  JWKS_URI: ${{ secrets.JWKS_URI }}
                  PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
            - name: Build-ts
              run: pnpm build

            - name: SonarCloud Scan
              uses: SonarSource/sonarcloud-github-action@master
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    build-and-push-docker:
        name: Build and Push Docker Image
        needs: build-and-test
        runs-on: blacksmith-4vcpu-ubuntu-2404

        env:
            IMAGE_NAME: adittt/mernstack_auth_service
            IMAGE_TAG: build-${{ github.run_number }}
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_PASSWORD }}
            - name: Build Docker image
              run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --platform linux/amd64 -f docker/prod/Dockerfile .
            - name: Push Docker image to Docker Hub
              run: docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
